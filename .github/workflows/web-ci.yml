name: web-ci

# Gate: typecheck + tests + production build for the TS monorepo (platform/).
# Triggers on changes under platform/ so unrelated study-doc commits stay fast.

on:
  push:
    branches: [main]
    paths: ['platform/**', '.github/workflows/web-ci.yml']
  pull_request:
    paths: ['platform/**', '.github/workflows/web-ci.yml']

defaults:
  run:
    working-directory: platform

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Typecheck tests (web)
        run: pnpm --filter @comforceeva/web typecheck:test

      - name: Unit tests
        run: pnpm -r test

      - name: Production build
        run: pnpm -r build
